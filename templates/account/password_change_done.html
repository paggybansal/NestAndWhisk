{% extends 'account/base_auth.html' %}

{% block title %}Password Updated | Nest & Whisk{% endblock %}

{% block auth_panel %}
  <p class="text-xs font-semibold uppercase tracking-[0.35em] text-caramel">Security</p>
  <h2 class="font-display mt-3 text-4xl font-semibold text-cocoa">Password updated.</h2>
  <p class="mt-4 text-sm leading-7 text-cocoa/70">Your Nest &amp; Whisk password has been changed successfully.</p>
  <div class="mt-8 flex flex-wrap gap-4">
    <a href="{% url 'account_dashboard' %}" class="inline-flex rounded-full bg-cocoa px-6 py-3 text-sm font-semibold text-cream transition hover:bg-chocolate">Back to dashboard</a>
    <a href="{% url 'account_profile' %}" class="inline-flex rounded-full border border-cocoa/15 px-6 py-3 text-sm font-semibold text-cocoa transition hover:border-caramel hover:text-caramel">Review account details</a>
  </div>
{% endblock %}
